<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Undangan Ilmy & Suami</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #fdf6f0;
    }
    .cover, .section {
      padding: 40px 20px;
    }
    .hidden { display: none; }
    img { max-width: 100%; border-radius: 12px; }
    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: #c59d5f;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      margin-top: 20px;
      cursor: pointer;
    }
    h1, h2 { margin: 10px 0; }
  </style>
</head>
<body>

<!-- COVER -->
<div class="cover" id="cover">
  <p><i>The Wedding Of</i></p>
  <img src="https://via.placeholder.com/400x250" alt="gambar" />
  <h1><i>Ilmy dan Suami</i></h1>
  <p>Kepada Yth Bapak/Ibu/Saudara/i</p>
  <h2 id="guestName">Tamu Undangan</h2>
  <div class="btn" onclick="openInvitation()">📩 Buka Undangan</div>
</div>

<!-- MAIN CONTENT -->
<div id="main" class="hidden">

  <!-- Halaman Utama -->
  <div class="section">
    <h1>Selamat Datang</h1>
    <p>Kami mengundang Anda ke pernikahan kami</p>
  </div>

  <!-- Mempelai -->
  <div class="section">
    <h2>Mempelai</h2>
    <p><b>Suami</b><br>Putra dari Bapak & Ibu</p>
    <p><b>Istri</b><br>Putri dari Bapak & Ibu</p>
  </div>

  <!-- Jadwal + Countdown -->
  <div class="section">
    <h2>Acara</h2>
    <p>Minggu, 10 Januari 2027</p>
    <h3 id="countdown"></h3>
  </div>

  <!-- Lokasi -->
  <div class="section">
    <h2>Lokasi</h2>
    <a class="btn" href="https://www.google.com/maps/place/ZAHRA+MEDIKA+HOSPITAL/@-0.5213684,101.5361373,537m/data=!3m1!1e3!4m6!3m5!1s0x2e2a4de4dd65bee5:0x84d6ea72dbbf030f!8m2!3d-0.5216211!4d101.5371985!16s%2Fg%2F11c60zy5hw?hl=en&entry=ttu" target="_blank">📍 Buka Google Maps</a>
  </div>

</div>

<!-- Musik -->
<audio id="music" loop>
  <source src="westlife.mp3" type="audio/mpeg">
</audio>

<script>
  // Ambil nama tamu dari URL
  const urlParams = new URLSearchParams(window.location.search);
  const guest = urlParams.get('to');
  if (guest) {
    document.getElementById('guestName').innerText = guest;
  }

  function openInvitation() {
    document.getElementById('cover').style.display = 'none';
    document.getElementById('main').classList.remove('hidden');
    document.getElementById('music').play();
  }

  // Countdown
  const targetDate = new Date("Jan 10, 2027 10:00:00").getTime();
  const countdownEl = document.getElementById("countdown");

  setInterval(() => {
    const now = new Date().getTime();
    const distance = targetDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((distance / (1000 * 60)) % 60);
    const seconds = Math.floor((distance / 1000) % 60);

    countdownEl.innerHTML = `${days} hari ${hours} jam ${minutes} menit ${seconds} detik`;
  }, 1000);
</script>

</body>
</html>
