<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Undangan Ilmy & Sumai</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #fff, #f7e7ce);
      text-align: center;
    }
    .container {
      padding: 40px 20px;
    }
    h1 { font-size: 2.5em; }
    .guest {
      font-size: 1.5em;
      color: #b8860b;
      margin-top: 10px;
    }
    .card {
      background: white;
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      max-width: 400px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: #b8860b;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Undangan Pernikahan</h1>
      <p>Kami mengundang Anda untuk hadir di acara pernikahan</p>
      <h2>Ilmy & Sumai</h2>
      <p class="guest" id="guestName">Tamu Undangan</p>
      <p>Hari/Tanggal: Minggu, 10 Januari 2027</p>
      <p>Lokasi: Gedung Serbaguna</p>
      <a class="btn" href="#">Buka Lokasi</a>
    </div>
  </div>

  <script>
    // Ambil nama dari URL ?to=Nama
    const urlParams = new URLSearchParams(window.location.search);
    const guest = urlParams.get('to');

    if (guest) {
      document.getElementById('guestName').innerText = guest;
    }
  </script>
</body>
</html>
